      :root,
      [data-theme='light'] {
        --boot-bg: #f0f8ff;
        --boot-surface: #fff;

        --boot-highlight: #e6f2fc;

      }

        --boot-bg: #070b14;
        --boot-surface: #0f1524;
        --boot-base: #1a2840;
        --boot-highlight: #151d30;
        --boot-accent: #5b9beb;
      }

      @media (prefers-color-scheme: dark) {
        :root:not([data-theme]) {
          --boot-bg: #070b14;
          --boot-surface: #0f1524;
          --boot-base: #1a2840;
          --boot-highlight: #151d30;
          --boot-accent: #5b9beb;
        }
      }

      #app-boot {
        min-height: 100dvh;
        background: var(--boot-bg);
      }

      #app-boot.is-hidden {
        display: none;
      }

      .boot-skeleton {
        width: min(100% - 2rem, 80rem);
        margin-inline: auto;
        padding-block: 1rem 2rem;
      }

      .boot-skeleton__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-block: 1rem;
      }

      .boot-skeleton__bone {
        border-radius: 0.75rem;
        background: linear-gradient(90deg, var(--boot-base) 0%, var(--boot-highlight) 50%, var(--boot-base) 100%);
        background-size: 200% 100%;
        animation: boot-shimmer 1.5s ease-in-out infinite;
      }

      .boot-skeleton__logo {
        width: 10rem;
        height: 2rem;
      }

      .boot-skeleton__menu {
        width: 2.5rem;

      }

      .boot-skeleton__title {
        width: min(100%, 28rem);
        height: 2.5rem;
        margin-inline: auto;
      }

      .boot-skeleton__subtitle {
        width: min(100%, 20rem);
        height: 1.25rem;
        margin: 1rem auto 0;
      }

      .boot-skeleton__cards {
        display: grid;
        gap: 1rem;
        margin-top: 2rem;
      }

      .boot-skeleton__card {
        height: 8rem;
        border-radius: 1.5rem;
        background: var(--boot-surface);
        border: 1px solid var(--boot-base);
      }

      @media (min-width: 640px) {
        .boot-skeleton__cards {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (min-width: 1024px) {
        .boot-skeleton__cards {
          grid-template-columns: repeat(4, 1fr);
        }

        .boot-skeleton__menu {
          display: none;
        }
      }

      @keyframes boot-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-skeleton__bone {
          animation: none;
        }
      }

    <script>
      (function () {
        var RELOAD_KEY = 'aitishka-boot-reload'

        function hideBoot() {
          var boot = document.getElementById('app-boot')
          if (boot)
            boot.classList.add('is-hidden')
        }

        function appMounted() {
          var app = document.getElementById('app')
          return Boolean(app && app.childElementCount > 0)
        }

        function reloadOnce() {
          if (sessionStorage.getItem(RELOAD_KEY))
            return false

          sessionStorage.setItem(RELOAD_KEY, '1')
          var url = new URL(window.location.href)
          url.searchParams.set('v', String(Date.now()))
          window.location.replace(url.toString())
          return true
        }

        window.addEventListener('error', function (event) {
          var target = event.target
          if (!target || target.tagName !== 'SCRIPT')
            return

          if (!appMounted() && !reloadOnce())
            hideBoot()
        }, true)

        window.addEventListener('DOMContentLoaded', function () {
          window.setTimeout(function () {
            if (appMounted()) {
              sessionStorage.removeItem(RELOAD_KEY)
              return
            }

            if (!reloadOnce())
              hideBoot()
          }, 4000)
        })
      })()
    </script>
    <script type="module" src="/src/main.ts"></script>
